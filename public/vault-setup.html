async function setup() {
  const status = document.getElementById('status');

  // 1. localStorage setzen
  localStorage.setItem('dashboard_vault_hash', HASH);
  localStorage.setItem('dashboard_vault_data', DATA);
  status.textContent = 'localStorage gesetzt — verbinde Supabase…';

  // 2. Supabase-Client mit bestehender Session
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const { data: { user }, error: authErr } = await client.auth.getUser();

  if (!user) {
    status.textContent = 'Nicht eingeloggt — nur localStorage gesetzt. Weiterleitung…';
    setTimeout(() => { window.location.href = '/'; }, 2000);
    return;
  }

  status.textContent = 'Schreibe in Supabase…';

  // 3. Supabase-Vault upsert
  const { error } = await client
    .from('password_vaults')
    .upsert({ user_id: user.id, master_hash: HASH, encrypted_data: DATA });

  if (error) {
    document.getElementById('icon').textContent = '⚠️';
    status.textContent = 'Supabase-Fehler: ' + error.message + ' — localStorage wurde gesetzt.';
    setTimeout(() => { window.location.href = '/'; }, 3000);
    return;
  }

  document.getElementById('icon').textContent = '✓';
  document.getElementById('title').textContent = 'Fertig!';
  status.textContent = '8 Einträge in Supabase + localStorage gespeichert. Weiterleitung…';
  setTimeout(() => { window.location.href = '/'; }, 1500);
}

setup().catch(e => {
  document.getElementById('icon').className = 'err';
  document.getElementById('icon').textContent = '✗';
  document.getElementById('status').textContent = 'Fehler: ' + e.message;
});
